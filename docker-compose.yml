services:
  db:
    image: postgres:15
    container_name: electronics_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-electronics}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-electronics}"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: electronics_web
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Django
      DEBUG: ${DEBUG:-1}
      SECRET_KEY: ${SECRET_KEY:-changeme-in-.env}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      # Postgres
      POSTGRES_DB: ${POSTGRES_DB:-electronics}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    ports:
      - "8000:8000"
    volumes:
      # Удобно для разработки: горячая перезагрузка при пересборке образа не нужна,
      # gunicorn перечитывать код не будет; если хочешь автоперезапуск — см. ниже вариант dev
      - .:/app

volumes:
  db_data:
