name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: |
          python -m pip install -U pip
          pip install flake8
          flake8 .

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: electronics
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd="pg_isready -U postgres -d electronics"
          --health-interval=5s --health-timeout=5s --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov
      - name: Migrate
        env:
          POSTGRES_DB: electronics
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
          SECRET_KEY: test
          DEBUG: "1"
        run: python manage.py migrate --noinput
      - name: Pytest + coverage
        env:
          POSTGRES_DB: electronics
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
          SECRET_KEY: test
          DEBUG: "1"
        run: pytest --cov=network --cov-report=term-missing -v

  health:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build & up
        run: |
          docker compose build
          docker compose up -d
      - name: Wait for /health
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost/health >/dev/null; then exit 0; fi
            sleep 2
          done
          echo "health check failed"; docker compose logs --no-color; exit 1
      - name: Check Swagger & ReDoc
        run: |
          curl -fI http://localhost/swagger/
          curl -fI http://localhost/redoc/
      - name: Teardown
        if: always()
        run: docker compose down -v
